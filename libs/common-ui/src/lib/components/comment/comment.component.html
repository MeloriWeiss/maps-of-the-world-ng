<div class="comment" [style.--depth]="depth()">
  @if (depth() > 0) {
  <div class="comment__rail"></div>
  }

  <div class="comment__wrapper">
    <svg icon="avatar-light" class="svg34"></svg>

    <div class="comment__body">
      <div class="comment__header">
        <p class="comment__username">{{ comment().user }}</p>

        <div class="comment__meta">
          <p class="comment__date">
            {{ comment().date | date : 'dd.MM.yyyy' }}
          </p>
          <p class="comment__time">{{ comment().date | date : 'HH:mm' }}</p>
        </div>
      </div>

      <p class="comment__content">{{ comment().text }}</p>

      <div class="comment__actions">
        <button class="comment__reply-btn">
          <svg icon="messages" class="svg10"></svg>
          <p>Ответить</p>
        </button>
      </div>
    </div>
  </div>

  <div class="comment__replies">
    @for (reply of comment().replies; track reply.id) {
    <wm-comment [comment]="reply" [depth]="depth() + 1"></wm-comment>
    }
  </div>
</div>
