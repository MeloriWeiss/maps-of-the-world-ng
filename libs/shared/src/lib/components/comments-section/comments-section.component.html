<section class="comments__section">
  <p class="comments-section__title">Комментарии:</p>

  <wm-comment-input
    class="comments-section__input"
    placeholder="Оставить комментарий..."
  ></wm-comment-input>

  @if (comments()) { @for (comment of comments(); track comment.id) {
  <wm-comment [comment]="comment" [depth]="0"></wm-comment>
  } }
</section>
