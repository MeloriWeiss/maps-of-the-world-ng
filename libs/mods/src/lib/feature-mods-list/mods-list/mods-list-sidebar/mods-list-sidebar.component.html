<div class="mods-list__sidebar">
  <div class="sidebar-actions">
    <div class="sidebar-mobile">
      <span class="sidebar-active-filter">{{ getActiveFilterLabel() }}</span>
      <svg class="svg15" icon="arrow-tailless" />
    </div>

    <button class="new-action-btn">Новый текстур-пак</button>
  </div>

  <div class="sidebar-filters">
    <div class="title">Фильтры</div>
    <nav>
      <ul class="sidebar-content-list">
        @for (filter of modsFilters$ | async; track filter.name) {
        <li>
          <wm-mods-filters-item [filter]="filter"></wm-mods-filters-item>
        </li>
        }
      </ul>
    </nav>
  </div>
</div>
