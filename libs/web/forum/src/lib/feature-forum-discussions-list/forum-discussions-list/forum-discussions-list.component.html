<wm-desk-list [title]="'Активные темы 1-21 из 138'">
  <wm-search-input
    class="search-input"
    [formControl]="searchControl"
    searchControl
  >
    <svg icon="search" class="svg20"></svg>
  </wm-search-input>

  <ng-template #sidebar>
    <wm-forum-sidebar></wm-forum-sidebar>
  </ng-template>

  <ng-container cards>
    @for (discussion of discussions$ | async; track discussion.id) {
      <wm-discussion-card [discussion]="discussion"></wm-discussion-card>
    }
  </ng-container>
</wm-desk-list>
