<wm-desk-list
  [pageable]="false"
  crumbs="Все обсуждения > Русскоязычный форум > Инструменты"
>
  <ng-template #sidebar>
    <wm-forum-sidebar></wm-forum-sidebar>
  </ng-template>

  <wm-search-input
    class="search-input"
    [formControl]="searchControl"
    searchControl
  >
    <svg icon="search" class="svg20"></svg>
  </wm-search-input>

  <div cards class="forum-content">
    <wm-forum-post></wm-forum-post>

    <wm-comments-section [comments]="comments | async"></wm-comments-section>
  </div>
</wm-desk-list>
