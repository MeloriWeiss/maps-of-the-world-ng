<form class="register-form" [formGroup]="registerForm" (ngSubmit)="register()">
  <h1 class="registration-header">Регистрация</h1>

  <div class="registration-body">
    <wm-labeled-form-field-wrapper label="Имя">
      <wm-form-input placeholder="Введите имя" formControlName="username">
        <div class="control-error-block" errorBlock>
          <span class="control-error-text">{{
            registerForm.controls.username.getError(
              authConfig.username.errorName
            )?.message
          }}</span>
        </div>
      </wm-form-input>
    </wm-labeled-form-field-wrapper>

    <wm-labeled-form-field-wrapper label="Адрес электронной почты">
      <wm-form-input
        placeholder="Введите адрес электронной почты"
        formControlName="email"
      >
        <div class="control-error-block" errorBlock>
          <span class="control-error-text">{{
            registerForm.controls.email.getError(authConfig.email.errorName)
              ?.message
          }}</span>
        </div>
      </wm-form-input>
    </wm-labeled-form-field-wrapper>

    <wm-labeled-form-field-wrapper label="Пароль">
      <wm-form-input
        placeholder="Введите пароль"
        type="password"
        formControlName="password"
      >
        <div class="control-error-block" errorBlock>
          <span class="control-error-text">{{
            registerForm.controls.password.getError(
              authConfig.password.errorName
            )?.message
          }}</span>
        </div>
      </wm-form-input>
    </wm-labeled-form-field-wrapper>

    <wm-labeled-checkbox
      label="Я согласен с политикой конфиденциальности"
    ></wm-labeled-checkbox>

    <button class="button" type="submit">Зарегистрироваться</button>
  </div>

  <p class="register-link">
    Уже есть аккаунт?&nbsp;<a [routerLink]="['/login']">Войти</a>
  </p>
</form>
