<form class="login-form" [formGroup]="loginForm" (ngSubmit)="login()">
  <h1 class="login-header">С возвращением!</h1>

  <div class="login-body">
    <wm-labeled-form-field-wrapper label="Адрес электронной почты">
      <wm-form-input
        placeholder="Введите адрес электронной почты"
        formControlName="email"
      >
        <div class="control-error-block" errorBlock>
          <span class="control-error-text">{{
            loginForm.controls.email.getError(authConfig.email.errorName)
              ?.message
          }}</span>
        </div>
      </wm-form-input>
    </wm-labeled-form-field-wrapper>

    <wm-labeled-form-field-wrapper label="Пароль">
      <wm-form-input placeholder="Введите пароль" formControlName="password">
        <div class="control-error-block" errorBlock>
          <span class="control-error-text">{{
            loginForm.controls.password.getError(authConfig.password.errorName)
              ?.message
          }}</span>
        </div>
      </wm-form-input>
    </wm-labeled-form-field-wrapper>

    <wm-labeled-checkbox
      label="Выполнять вход автоматически"
    ></wm-labeled-checkbox>

    <button class="button">Войти</button>
  </div>

  <p class="login-link">
    Ещё нет аккаунта?&nbsp;<a [routerLink]="['/register']"
      >Зарегистрироваться</a
    >
  </p>
</form>
